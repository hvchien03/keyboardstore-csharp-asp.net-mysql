<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #4CAF50; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; background: #f9f9f9; }
        .button { background: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chào mừng đến Keyboard Store! 🎉</h1>
        </div>
        <div class="content">
            <p>Xin chào <strong>{{UserEmail}}</strong>,</p>
            <p>Cảm ơn bạn đã đăng ký tài khoản tại Keyboard Store!</p>
            <p>Bạn có thể bắt đầu mua sắm ngay bây giờ.</p>
            <p style="text-align: center; margin-top: 30px;">
                <a href="{{SiteUrl}}" class="button">Khám phá sản phẩm</a>
            </p>
        </div>
    </div>
</body>
</html>
